<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>△ Home</title>
    <link rel="shortcut icon" href="static/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="static/icons/favicon-16.png">
    <style>
    <style>
/* ... (Your existing CSS) ... */
:root {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
}

html {
    align-items: center;
    display: flex;
    height: 100%;
    font: 24px "IBM Plex Mono", Courier, monospace;
    background-color: #181A1B; /* Dark background */
    justify-content: center;
    margin: 0;
}

body {
    display: flex;
    margin: 1em;
    padding: 1em;
}

.search-div {
    font-size: 2.5em;
    grid-column: 1 / -1;
    margin: 0;
    padding-top: 1vw;
    text-align: left;
    display: flex;
    align-items: center;
}

input[type="text"] {
    border: none;
    box-sizing: border-box;
    font-weight: bold;
    font: inherit;
    width: 100%;
    background: transparent;
    color: white; /* White text for input field */
}

label {
    color: #77b7ff; /* Blue label */
    width: 1em;
}

form:focus-within::placeholder {
    opacity: 0;
}

input:focus,
select:focus,
textarea:focus,
button:focus {
    outline: none;
}

a {
    color: white;    /* White link color */
    text-decoration: none;
}

a:focus,
a:hover {
    color: #77a3ca; /* Lighter blue on hover */
}
    </style>
</head>

<body>  
    <nav>
        <div class="search-div">
            <label for="q">></label>
            <input autofocus id="searchbox" name="q" type="text" placeholder="けんさくする..."></input>
        </div>
    </nav>
    <script src="static/js/search.js" type="text/javascript"></script>
</body>

</html>
